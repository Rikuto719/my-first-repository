<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMR・TDEE計算機</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 40px 16px;
      letter-spacing: 0.01em;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: #111;
      letter-spacing: 0.05em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .card {
      background: #fff;
      border-radius: 4px;
      padding: 28px;
      max-width: 560px;
      margin: 0 auto 20px;
      border: 1px solid #e8e8e8;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input, select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 2px;
      font-size: 0.95rem;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #333;
      background: white;
    }

    .gender-group {
      display: flex;
      gap: 8px;
    }

    .gender-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 2px;
      background: #fafafa;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      text-align: center;
      transition: all 0.15s;
      color: #888;
    }

    .gender-btn.active {
      border-color: #111;
      background: #111;
      color: #fff;
      font-weight: 500;
    }

    button.calc-btn {
      width: 100%;
      padding: 13px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 2px;
      font-size: 0.85rem;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 22px;
      transition: background 0.15s;
    }

    button.calc-btn:hover {
      background: #333;
    }

    .result-card {
      background: #fff;
      border-radius: 4px;
      max-width: 560px;
      margin: 0 auto;
      border: 1px solid #e8e8e8;
      overflow: hidden;
      display: none;
    }

    .result-title {
      padding: 14px 24px;
      background: #111;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f5f5f5;
      padding: 11px 16px;
      text-align: center;
      font-size: 0.72rem;
      color: #888;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #e8e8e8;
    }

    tbody td {
      padding: 12px 16px;
      text-align: center;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr.current-row {
      background: #f5f5f5;
    }

    tbody tr.current-row td {
      color: #111;
      font-weight: 600;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      background: #333;
      color: white;
      padding: 2px 6px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.05em;
      font-weight: 400;
    }

    .note {
      padding: 12px 24px;
      font-size: 0.72rem;
      color: #aaa;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
      line-height: 1.7;
      font-weight: 300;
    }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full-width { grid-column: 1; }
    }
  </style>
</head>
<body>

  <h1>BMR・TDEE 計算機</h1>
  <p class="subtitle">体重減少に伴う基礎代謝・活動代謝の変化を確認できます</p>

  <div class="card">
    <div class="form-grid">

      <div class="form-group full-width">
        <label>性別</label>
        <div class="gender-group">
          <div class="gender-btn active" id="btn-male" onclick="selectGender('male')">男性</div>
          <div class="gender-btn" id="btn-female" onclick="selectGender('female')">女性</div>
        </div>
      </div>

      <div class="form-group">
        <label>年齢（歳）</label>
        <input type="number" id="age" placeholder="例: 35" min="10" max="100">
      </div>

      <div class="form-group">
        <label>身長（cm）</label>
        <input type="number" id="height" placeholder="例: 170" min="100" max="250">
      </div>

      <div class="form-group">
        <label>現在の体重（kg）</label>
        <input type="number" id="currentWeight" placeholder="例: 85" min="30" max="300" step="0.1">
      </div>

      <div class="form-group">
        <label>目標体重（kg）</label>
        <input type="number" id="targetWeight" placeholder="例: 80" min="30" max="300" step="0.1">
      </div>

      <div class="form-group full-width">
        <label>普段の活動レベル</label>
        <select id="activity">
          <option value="1.2">座りがち（デスクワーク中心、ほぼ運動なし）</option>
          <option value="1.375">軽い運動（週1〜3日）</option>
          <option value="1.55" selected>中程度の運動（週3〜5日）</option>
          <option value="1.725">ハードな運動（週6〜7日）</option>
          <option value="1.9">非常にハード（肉体労働 or 1日2回トレーニング）</option>
        </select>
      </div>

    </div>

    <button class="calc-btn" onclick="calculate()">計算する</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-title" id="resultTitle"></div>
    <table>
      <thead>
        <tr>
          <th>体重</th>
          <th>BMR（基礎代謝）</th>
          <th>TDEE（活動代謝）</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
    <div class="note">
      BMR：Mifflin-St Jeor式で算出｜TDEE = BMR × 活動レベル係数<br>
      BMR：安静時に消費するカロリー｜TDEE：1日の総消費カロリー
    </div>
  </div>

  <script>
    let gender = 'male';

    function selectGender(g) {
      gender = g;
      document.getElementById('btn-male').classList.toggle('active', g === 'male');
      document.getElementById('btn-female').classList.toggle('active', g === 'female');
    }

    function calcBMR(weight, height, age, gender) {
      const base = 10 * weight + 6.25 * height - 5 * age;
      return gender === 'male' ? base + 5 : base - 161;
    }

    function calculate() {
      const age = parseInt(document.getElementById('age').value);
      const height = parseFloat(document.getElementById('height').value);
      const currentWeight = parseFloat(document.getElementById('currentWeight').value);
      const targetWeight = parseFloat(document.getElementById('targetWeight').value);
      const activity = parseFloat(document.getElementById('activity').value);

      if (!age || !height || !currentWeight || !targetWeight) {
        alert('すべての項目を入力してください');
        return;
      }

      if (targetWeight > currentWeight) {
        alert('目標体重は現在体重より小さい値を入力してください');
        return;
      }

      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';

      for (let w = currentWeight; w >= targetWeight - 0.001; w = Math.round((w - 1) * 10) / 10) {
        const bmr = Math.round(calcBMR(w, height, age, gender));
        const tdee = Math.round(bmr * activity);
        const isCurrentWeight = Math.abs(w - currentWeight) < 0.001;

        const tr = document.createElement('tr');
        if (isCurrentWeight) tr.classList.add('current-row');

        tr.innerHTML = `
          <td>${w.toFixed(1)} kg${isCurrentWeight ? '<span class="badge">現在</span>' : ''}</td>
          <td>${bmr.toLocaleString()} kcal</td>
          <td>${tdee.toLocaleString()} kcal</td>
        `;
        tbody.appendChild(tr);
      }

      const activityLabels = {
        '1.2': '座りがち',
        '1.375': '軽い運動（週1〜3日）',
        '1.55': '中程度の運動（週3〜5日）',
        '1.725': 'ハードな運動（週6〜7日）',
        '1.9': '非常にハード'
      };

      document.getElementById('resultTitle').textContent =
        `${gender === 'male' ? '男性' : '女性'} / ${age}歳 / ${height}cm｜活動レベル：${activityLabels[String(activity)]}`;

      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
    }
  </script>

</body>
</html>
